# Points Deal Finder — Configuration

balances:
  chase_ur: 0
  capital_one: 86000
  united_miles: 73000

origins:
  - SAN
  - LAX
  - SFO
  - SNA
  - DEN
  - SEA
  - PHX
  - SLC

cabin: business  # only business class

travelers: 2  # Nick + Krista — need 2 seats

# Defined trips with outbound + return date windows
trips:
  - name: "Opportunistic Flights"
    destinations:
      - region: europe
        preferred_airports: [LHR, CDG, FRA, AMS, MAD, BCN, LIS, FCO, ZRH]
      - region: asia
        preferred_airports: [HND, NRT, ICN, SIN, BKK, HKG]
    outbound:
      earliest: "2026-08-15"
      latest: "2026-12-15"
    return:
      earliest: "2026-08-22"
      latest: "2027-02-28"
    flexibility_days: 7
    priority: medium
    email_note: "Monitoring broad aspirational routes with flexible dates now that summer 2026 is booked."

  - name: "Asia Winter 2027"
    destinations:
      - region: asia
        preferred_airports: [NRT, HND, KIX, ICN, SIN, BKK, HKG]
    outbound:
      earliest: "2027-01-16"
      latest: "2027-01-25"
    return:
      earliest: "2027-02-08"
      latest: "2027-02-22"
    flexibility_days: 5
    priority: high

# Manual transfer bonuses (Phase 1 — Phase 2 adds scrapers)
# Update these when you spot new bonuses
transfer_bonuses:
  # Example:
  # - source_program: chase_ur
  #   target_program: avios
  #   bonus_percentage: 0.20
  #   start_date: "2026-03-01"
  #   end_date: "2026-03-31"
  #   source_url: "https://frequentmiler.com/..."
  #   notes: "20% Chase → Avios through March 2026"

# Route quality filters
routing:
  max_connections: 1
  max_total_layover_hours: 20
  max_total_travel_hours: 40

# Value floor — don't burn points if cash is cheap
value_floor:
  min_cpp: 1.5

# Email settings
email:
  recipients:
    - norangio@gmail.com
    - krista.hakola@gmail.com
  max_deals_per_email: 15
  include_transfer_bonus_summary: true
