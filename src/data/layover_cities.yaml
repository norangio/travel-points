      - mode: Metro
        cost_usd: 1
        time_min: 20
        notes: "Red Line direct to city center (Msheireb)"
      - mode: Taxi
        cost_usd: 15
        time_min: 20
        notes: "Uber/Careem available"
    notes: "Qatar offers free transit hotel for layovers 8-24h via Discover Qatar program"

