# Layover city data for long-layover analysis
# hotel_3star_usd: typical nightly rate for a 3-star+ hotel
# airport_hotel_usd: rate for hotels within 10 min of airport
# city_center_hotel_usd: rate for 3-star+ hotels in city center
# transit: available transit options from airport
# Updated: March 2026

airports:
